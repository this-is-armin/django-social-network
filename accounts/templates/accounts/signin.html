{% extends 'base.html' %}

{% load static %}

{% block title %} Sign In {% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'accounts/css/signin.css' %}">
{% endblock %}

{% block content %}

<div class="container">
    <h1>Sign In</h1>
    
    <br><br>

    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Sign In">
    </form>
</div>

{% endblock %}
